name: Build Status

on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
          os:
            - ubuntu-24.04 # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md
            - macos-14 # https://github.com/actions/runner-images/blob/main/images/macos/macos-14-arm64-Readme.md
            - windows-2022 # https://github.com/actions/runner-images/blob/main/images/windows/Windows2022-Readme.md
          python-version:
            - "3.11"
          cibuildwheel:
            - "cp311"
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        submodules: 'true'

    - name: Setup cache (mac/linux)
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: "/home/runner/work/verilator-python/verilator-python/.ccache"
        key: cache-${{ runner.os }}-
        restore-keys: cache-${{ runner.os }}-
      if: ${{ runner.os != 'Windows' }}

    - name: Setup cache (windows)
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: "C:/ProgramData/chocolatey/"
        key: cache-${{ runner.os }}-
        restore-keys: cache-${{ runner.os }}-
      if: ${{ runner.os == 'Windows' }}

    - uses: actions-ext/python/setup@main
      with:
        version: ${{ matrix.python-version }}

